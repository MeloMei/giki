llm:
  compile:
    provider: openai
    model: evomap-glm-5.2
    base_url: https://api.evomap.ai/v1
    api_key_env: EVOMAP_API_KEY
    max_retries: 1
    timeout_sec: 120
  review:
    provider: openai
    model: evomap-glm-5.2
    base_url: https://api.evomap.ai/v1
    api_key_env: EVOMAP_API_KEY
    max_retries: 1
    timeout_sec: 120

ingest:
  chunk_size: 12000
  chunk_overlap: 500
  synthesize_context: 6000
  interactive: auto
  pdf:
    page_separator: "<!-- giki:page {n} -->"
    reject_scanned: true

review:
  unrelated_edit_threshold: 0.30
  severity_blocking: [blocker]
  pr_comment_collapse: true

wiki:
  enforce_slug_pattern: "^[a-z0-9-]+$"
  max_slug_length: 80
  related_min_neighbors: 1
